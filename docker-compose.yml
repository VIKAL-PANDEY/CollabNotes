version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: collabnotes_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./collabnotes.db
      - JWT_SECRET=supersecretkeyforcollabnotes1234!
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: collabnotes_frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_data:
